name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,pdf,geo]"

      - name: Run linting
        run: |
          ruff check agrobr/ tests/
          ruff format --check agrobr/ tests/

      - name: Run type checking
        run: |
          mypy agrobr/

      - name: Run tests
        run: |
          pytest tests/ -v -m "not integration and not benchmark" --cov=agrobr --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Security audit (pip-audit)
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --skip-editable --ignore-vuln CVE-2026-3219
