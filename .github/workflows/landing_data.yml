name: Landing Data

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.LANDING_PUSH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install agrobr
        run: pip install -e .

      - name: Atualiza dados da landing
        run: python scripts/update_landing_data.py

      - name: Commit se houver mudanca
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "agrobr-bot"
          git config user.email "bot@agrobr.dev"
          git add index.html en/index.html
          git diff --staged --quiet || (git commit -m "chore(landing): atualiza indicadores do ticker [skip ci]" && git pull --rebase origin main && git push && gh workflow run docs.yml --ref main)
