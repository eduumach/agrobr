name: Daily Health Check

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AGROBR_ALERT_ENABLED: "true"
      AGROBR_ALERT_SLACK_WEBHOOK: ${{ secrets.AGROBR_SLACK_WEBHOOK }}
      AGROBR_ALERT_DISCORD_WEBHOOK: ${{ secrets.AGROBR_DISCORD_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Restore health DB cache
        uses: actions/cache@v4
        with:
          path: ~/.agrobr/cache/agrobr.duckdb
          key: health-db-${{ github.run_number }}
          restore-keys: |
            health-db-

      - name: Run health checks with state
        id: health
        run: |
          python -c "
          import asyncio, json, sys
          from agrobr.health.checker import run_checks_with_state, format_results
          from agrobr.health.registry import get_affected_datasets
          from agrobr.health.state import get_consecutive_failures, get_last_success
          from agrobr.alerts.notifier import send_alert

          async def main():
              results = await run_checks_with_state()

              check_results = [r for r, _, _ in results]
              print(format_results(check_results))

              report = {
                  'checks': [
                      {
                          'source': r.source.value,
                          'status': r.status.value,
                          'category': r.category,
                          'latency_ms': round(r.latency_ms, 1),
                          'message': r.message,
                      }
                      for r in check_results
                  ]
              }

              with open('health_report.json', 'w') as f:
                  json.dump(report, f, indent=2)

              failed = [r.source.value for r in check_results if r.status.value == 'failed']
              overall = 'error' if len(failed) == len(check_results) else ('degraded' if failed else 'healthy')

              with open('$GITHUB_OUTPUT' if '$GITHUB_OUTPUT' != '' else '/dev/null', 'a') as out:
                  print(f'overall_status={overall}', file=out)

              for result, should_alert, level in results:
                  if should_alert and level:
                      datasets = get_affected_datasets(result.source)
                      failures = get_consecutive_failures(result.source)
                      last_ok = get_last_success(result.source)
                      if result.status.value == 'ok':
                          title = f'Source recovered: {result.source.value}'
                      elif result.category == 'soft_block':
                          title = f'Source blocked (Cloudflare): {result.source.value}'
                      else:
                          title = f'Source {result.status.value}: {result.source.value}'
                      await send_alert(
                          level=level,
                          title=title,
                          details={'message': result.message, 'category': result.category},
                          source=result.source.value,
                          category=result.category,
                          affected_datasets=datasets or None,
                          consecutive_failures=failures,
                          last_success_at=last_ok,
                      )
                      print(f'Alert sent: {level.value} - {result.source.value}')

              if failed:
                  sys.exit(1)

          asyncio.run(main())
          "
          echo "overall_status=$(python -c "import json; r=json.load(open('health_report.json')); fs=[c for c in r['checks'] if c['status']=='failed']; print('error' if len(fs)==len(r['checks']) else ('degraded' if fs else 'healthy'))")" >> $GITHUB_OUTPUT

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_number }}
          path: health_report.json
          retention-days: 30
