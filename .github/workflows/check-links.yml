name: Check Links

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: check-links
  cancel-in-progress: true

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --format markdown
            README.md
            CHANGELOG.md
            index.html
            "docs/**/*.md"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Manage issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const label = 'links-quebrados';
            const exitCode = '${{ steps.lychee.outputs.exit_code }}';
            const reportPath = './lychee/out.md';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });
            const existing = issues[0] || null;

            // exit_code 0 = OK, 2 = erros de rede (timeouts) — não são links mortos
            if (exitCode === '0' || exitCode === '2') {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: 'Todos os links estão OK. Fechando automaticamente.',
                });
                core.info(`Issue #${existing.number} fechada`);
              }
              return;
            }

            let report = '> Nenhum relatório gerado.';
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              core.warning(`Não foi possível ler ${reportPath}: ${e.message}`);
            }

            const now = new Date().toISOString().split('T')[0];
            const title = `Links quebrados detectados (${now})`;
            const body = [
              '## Links Quebrados',
              '',
              `Detectados pelo [check-links workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              '',
              '<details>',
              '<summary>Relatório lychee</summary>',
              '',
              report,
              '',
              '</details>',
              '',
              '---',
              `Última verificação: ${new Date().toISOString()}`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: title,
                body: body,
              });
              core.info(`Issue #${existing.number} atualizada`);
            } else {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e11d48',
                  description: 'Links quebrados detectados pelo check-links workflow',
                });
              }

              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
              core.info(`Issue #${newIssue.number} criada`);
            }
