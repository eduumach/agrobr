# ── Rede e retry ─────────────────────────────────────────────
max_retries = 3
retry_wait_time = 10
timeout = 30
max_concurrency = 4
max_redirects = 10

# ── Cache ────────────────────────────────────────────────────
cache = true
max_cache_age = "1d"

# ── Aceitar status codes que não indicam link morto ──────────
# 200-204 = OK, 429 = rate limit, 403 = bloqueio de bot
accept = ["200..=204", "429", "403"]

# ── Identidade ───────────────────────────────────────────────
user_agent = "Mozilla/5.0 (compatible; agrobr-link-checker/1.0; +https://github.com/bruno-portfolio/agrobr)"

# ── Escopo ───────────────────────────────────────────────────
include_fragments = false
exclude_all_private = true
exclude_mail = true

# ── Excludes (regex) ─────────────────────────────────────────
